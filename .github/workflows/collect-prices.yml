name: Collect Naver Prices

on:
  schedule:
    # Every day at 06:00 KST (21:00 UTC previous day)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Collect prices from Naver Shopping API
        run: node scripts/collect-prices.mjs
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Enrich new products (fill missing descriptions/links)
        run: node scripts/enrich-products.mjs --write

      - name: Update category bestseller rankings
        run: node scripts/update-category-ranks.mjs --write
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/products/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push price updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/products/
          git commit -m "chore: update product prices $(date +%Y-%m-%d)"
          git push
